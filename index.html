<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Ordering System</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar bg-white shadow-sm px-3">
    <ion-icon name="menu-outline" class="menu-toggle" data-bs-toggle="offcanvas"
      data-bs-target="#sidebarMenu"></ion-icon>
    <div class="search-bar d-flex flex-grow-1 mx-3">
      <input type="text" class="form-control" placeholder="Search for dishes...">
      <button class="btn btn-danger ms-2">Search</button>
    </div>
    <div class="profile d-flex gap-3">
      <a href="#" class="cart"><ion-icon name="cart-outline"></ion-icon></a>
      <a href="#" class="user"><ion-icon name="person-outline"></ion-icon></a>
    </div>
  </nav>

  <!-- Sidebar Offcanvas -->
  <div class="offcanvas offcanvas-start text-bg-danger" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Foodie</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="sidebar-menus">
        <a href="#"><ion-icon name="home-outline"></ion-icon> Home</a>
        <a href="#"><ion-icon name="receipt-outline"></ion-icon> Bills</a>
        <a href="#"><ion-icon name="wallet-outline"></ion-icon> Wallet</a>
        <a href="#"><ion-icon name="notifications-outline"></ion-icon> Notifications</a>
        <a href="#"><ion-icon name="chatbubble-outline"></ion-icon> Contact Us</a>
        <a href="#"><ion-icon name="settings-outline"></ion-icon> Settings</a>
      </div>
      <hr>
      <a href="#" class="btn btn-success w-100"><ion-icon name="log-out-outline"></ion-icon> Logout</a>
    </div>
  </div>

  <!-- Main content -->
  <div class="container mt-4">
    <!-- Highlight section -->
    <div class="main-highlight bg-white p-3 rounded shadow-sm">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="main-title text-danger">Recommendations</h2>
        <div class="main-arrow d-flex gap-2">
          <ion-icon class="back" name="chevron-back-circle-outline"></ion-icon>
          <ion-icon class="next" name="chevron-forward-circle-outline"></ion-icon>
        </div>
      </div>

      <div class="highlight-wrapper d-flex flex-wrap gap-3 mt-3">
        <div class="highlight-card p-2 rounded shadow-sm">
          <img src="img/salad.jpeg" alt="Fresh Salad" class="highlight-img">
          <div class="highlight-desc mt-2">
            <h3>Fresh Salad</h3>
            <p>$42.58</p>
          </div>
        </div>
        <div class="highlight-card p-2 rounded shadow-sm">
          <img src="img/coffee.jpeg" alt="Hot Coffee" class="highlight-img">
          <div class="highlight-desc mt-2">
            <h3>Hot Coffee</h3>
            <p>$15.99</p>
          </div>
        </div>
        <div class="highlight-card p-2 rounded shadow-sm">
          <img src="img/pizza.jpeg" alt="Pizza" class="highlight-img">
          <div class="highlight-desc mt-2">
            <h3>Pizza</h3>
            <p>$29.99</p>
          </div>
        </div>
        <div class="highlight-card p-2 rounded shadow-sm">
          <img src="img/burger.jpeg" alt="Burger" class="highlight-img">
          <div class="highlight-desc mt-2">
            <h3>Burger</h3>
            <p>$19.99</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Categories -->
    <div class="main-menus bg-white p-3 rounded shadow-sm mt-4">
      <div class="d-flex justify-content-between align-items-center">
        <h2 class="main-title text-danger">Menu <br>Category</h2>
        <div class="main-arrow d-flex gap-2">
          <ion-icon class="back-menus" name="chevron-back-circle-outline"></ion-icon>
          <ion-icon class="next-menus" name="chevron-forward-circle-outline"></ion-icon>
        </div>
      </div>

      <div class="filter-wrapper d-flex flex-wrap gap-3 mt-3">
        <div class="filter-card"><ion-icon name="restaurant-outline" class="filter-icon"></ion-icon>
          <p>All Menus</p>
        </div>
        <div class="filter-card"><ion-icon name="fast-food-outline" class="filter-icon"></ion-icon>
          <p>Burger</p>
        </div>
        <div class="filter-card"><ion-icon name="pizza-outline" class="filter-icon"></ion-icon>
          <p>Pizza</p>
        </div>
        <div class="filter-card"><ion-icon name="wine-outline" class="filter-icon"></ion-icon>
          <p>Drinks</p>
        </div>
        <div class="filter-card"><ion-icon name="ice-cream-outline" class="filter-icon"></ion-icon>
          <p>Ice Cream</p>
        </div>
        <div class="filter-card"><ion-icon name="cafe-outline" class="filter-icon"></ion-icon>
          <p>Coffee</p>
        </div>
        <div class="filter-card"><ion-icon name="fish-outline" class="filter-icon"></ion-icon>
          <p>Seafood</p>
        </div>
        <div class="filter-card"><ion-icon name="fast-food-outline" class="filter-icon"></ion-icon>
          <p>Chicken</p>
        </div>
        <div class="filter-card"><ion-icon name="cut-outline" class="filter-icon"></ion-icon>
          <p>Mutton</p>
        </div>
        <div class="filter-card"><ion-icon name="egg-outline" class="filter-icon"></ion-icon>
          <p>Egg</p>
        </div>
        <div class="filter-card"><ion-icon name="flame-outline" class="filter-icon"></ion-icon>
          <p>Soup</p>
        </div>
        <div class="filter-card"><ion-icon name="nutrition-outline" class="filter-icon"></ion-icon>
          <p>Healthy</p>
        </div>
      </div>
    </div>

    <hr class="divider my-4">

    <!-- Food detail section -->
    <div class="main-detail bg-white p-3 rounded shadow-sm">
      <h2 class="main-title text-danger">Choose Order</h2>
      <div class="detail-wrapper d-flex flex-wrap gap-3 mt-3" id="dynamicMenuItems">
        <!-- Items will be dynamically generated here -->
      </div>
    </div>
  </div> <!-- end container -->

  <!-- Bootstrap JS (with Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>

</html>
